<svg width="800" height="4" viewBox="0 0 800 4" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#58a6ff">
        <animate attributeName="offset" values="-1; 1" dur="3s" repeatCount="indefinite" />
      </stop>
      <stop offset="50%" stop-color="#bc8cff">
        <animate attributeName="offset" values="-0.5; 1.5" dur="3s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#58a6ff">
        <animate attributeName="offset" values="0; 2" dur="3s" repeatCount="indefinite" />
      </stop>
    </linearGradient>
  </defs>
  <rect width="800" height="4" rx="2" fill="url(#grad)" />
</svg>
